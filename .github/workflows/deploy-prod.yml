name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - master
      - main

jobs:
  check-ci-success:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      ci-passed: "true"
    steps:
      - name: CI checks passed
        run: echo "CI workflow completed successfully"

  request-qa-approval:
    runs-on: ubuntu-latest
    needs: check-ci-success
    environment:
      name: production
    steps:
      - name: QA approval gate reached
        run: echo "Ready for production deployment — awaiting QA approval"

  deploy-to-production:
    runs-on: ubuntu-latest
    needs: request-qa-approval
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_commit.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Build toolchain (typescript, vite, @vitejs/plugin-react, vitest, jsdom)
        # lives in devDependencies and `tsc -b` typechecks src (incl. *.test.ts with
        # types: ["vitest/globals"]). --omit=dev strips it → build fails (PLE-131).
        # Match the green CI EXACTLY and force dev deps explicitly so a stray
        # NODE_ENV=production (which makes even bare `npm ci` skip devDependencies)
        # can never silently re-break the prod build. Vite emits static assets, so
        # dev deps ship nothing to prod.
        run: NODE_ENV=development npm ci --include=dev

      - name: Build
        run: npm run build

      - name: Deploy to Vercel Production
        env:
          # Secret (DevOps-owned). Set via `gh secret set VERCEL_TOKEN` at repo scope —
          # this job has no `environment:` block, so an env-scoped secret would NOT reach it.
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          # Project linking (PLE-132 Gap 2). A fresh actions/checkout has no `.vercel/`
          # context and it is not committed, so a bare `vercel deploy --prod` would fail
          # or create a wrong/new project non-interactively. These are project IDs, not
          # secrets — they let the CLI resolve the canonical `_default` project without
          # `vercel link`/`.vercel/project.json`.
          VERCEL_ORG_ID: team_TJXAYUO2XsQ1Dvxqpczl9XYG
          VERCEL_PROJECT_ID: prj_TOaQijUYMkj8Ep95Z8W3lVKBBOFF
        run: |
          npm install -g vercel
          # Pull production project settings so the deploy is fully linked + non-interactive.
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel deploy --prod --token="$VERCEL_TOKEN"
